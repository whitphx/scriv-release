name: scriv-release
description: Changesets-style preview PR + release for scriv-managed projects.

inputs:
  app-id:
    description: GitHub App ID. If set, used to mint a token that triggers downstream workflows on tag push.
    required: false
    default: ""
  app-private-key:
    description: GitHub App private key (PEM). Required when app-id is set.
    required: false
    default: ""
  github-token:
    description: Fallback token. The default GITHUB_TOKEN does not trigger downstream workflows on tag push.
    required: false
    default: ""
  preview-branch:
    description: Branch name used for the changelog preview PR.
    required: false
    default: scriv-release-preview
  python-version:
    description: Python version used to install and run scriv-release.
    required: false
    default: "3.13"
  install-command:
    description: Command run after Python is set up to install scriv-release.
    required: false
    default: pip install 'scriv-release[bump-my-version]'

outputs:
  bump-level:
    description: Computed bump level on HEAD (empty if no fragments present).
    value: ${{ steps.policy.outputs.level }}
  next-version:
    description: Next version string when fragments are present.
    value: ${{ steps.policy.outputs.next }}
  released:
    description: "true if a release tag was pushed."
    value: ${{ steps.release.outputs.released }}
  tag:
    description: The tag pushed by the release step.
    value: ${{ steps.release.outputs.tag }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install scriv-release
      shell: bash
      run: ${{ inputs.install-command }}

    - name: Configure git identity
      shell: bash
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

    - name: Mint GitHub App token
      id: app-token
      if: inputs.app-id != ''
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.app-private-key }}
        permission-contents: write
        permission-pull-requests: write

    - name: Compute bump level
      id: policy
      shell: bash
      run: |
        level=$(scriv-release bump-level)
        {
          echo "level=${level}"
        } >> "$GITHUB_OUTPUT"
        if [ -n "$level" ]; then
          next=$(scriv-release next-version)
          {
            echo "next=${next}"
          } >> "$GITHUB_OUTPUT"
        fi

    - name: Open or update changelog preview PR
      id: preview
      if: steps.policy.outputs.level != ''
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token || inputs.github-token || github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        PREVIEW_BRANCH: ${{ inputs.preview-branch }}
        NEXT_VERSION: ${{ steps.policy.outputs.next }}
      run: bash "$GITHUB_ACTION_PATH/scripts/open-preview-pr.sh"

    - name: Tag release if preview was just merged
      id: release
      if: steps.policy.outputs.level == ''
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token || inputs.github-token || github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: bash "$GITHUB_ACTION_PATH/scripts/maybe-tag-release.sh"
