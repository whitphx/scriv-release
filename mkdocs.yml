site_name: scriv-release
site_description: Changesets-style release automation on top of scriv. A GitHub Action that opens a Changelog Preview PR when fragments are pending and tags a release once that PR is merged.
site_url: https://whitphx.github.io/scriv-release/
repo_url: https://github.com/whitphx/scriv-release
repo_name: whitphx/scriv-release
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - The changesets pattern: changesets.md
  - Quickstart: quickstart.md
  - Token setup: token-setup.md
  - Install the App: install-app/index.html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/whitphx/scriv-release
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/scriv-release/
